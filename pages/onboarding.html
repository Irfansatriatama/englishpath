<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding — EnglishPath</title>
  <meta name="theme-color" content="#1a6cf0">
  <link rel="manifest" href="../manifest.json">
  <script>
    (function() {
      const dm = localStorage.getItem('ep_dark_mode');
      if (dm === 'true') document.documentElement.setAttribute('data-theme', 'dark');
      const ct = localStorage.getItem('ep_color_theme');
      if (ct) document.documentElement.setAttribute('data-color-theme', ct);
      const fn = localStorage.getItem('ep_font');
      if (fn) document.documentElement.setAttribute('data-font', fn);
      const rd = localStorage.getItem('ep_radius');
      if (rd) document.documentElement.setAttribute('data-radius', rd);
    })();
  </script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/onboarding.css">
</head>
<body>
<div class="onboarding-page" id="ob-page">
  <header class="ob-header">
    <div class="ob-logo">EnglishPath</div>
    <div class="ob-step-indicator">
      <span id="ob-step-text">Langkah 1 dari 5</span>
    </div>
  </header>
  <div class="ob-progress-wrap">
    <div class="ob-progress-labels">
      <span id="ob-progress-label">Mulai</span>
      <span id="ob-progress-pct">0%</span>
    </div>
    <div class="ob-progress-track">
      <div class="ob-progress-fill" id="ob-progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div id="ob-step-container"></div>
</div>
<div id="toast-container"></div>
<script src="../assets/js/core/storage.js"></script>
<script src="../assets/js/core/auth.js"></script>
<script src="../assets/js/core/router.js"></script>
<script src="../assets/js/core/app.js"></script>
<script src="../assets/js/modules/xp.js"></script>
<script src="../assets/js/data/placement-questions.js"></script>
<script src="../assets/js/pages/onboarding.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(getBase() + 'sw.js').catch(function() {});
  }
</script>
</body>
</html>
